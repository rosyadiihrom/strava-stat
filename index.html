<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strava Stat Generator & Auto Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --strava-orange: #fc5200;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 480px; 
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 5px;
            color: var(--strava-orange); 
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* --- PREVIEW BOX STRAVA --- */
        .preview-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            width: 100%;
            overflow: hidden;
        }

        #strava-card {
            width: 100%;
            background-color: #000000; 
            padding: 35px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border-radius: 6px;
            
            /* Menceperkan seluruh isi kartu (Teks, Logo Strava, & Sepatu) secara bersamaan */
            transform: scaleY(0.85);
            transform-origin: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            text-align: center;
            margin-bottom: 5px;
            gap: 4px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            color: #ffffff;
            font-size: 4vw; 
            font-weight: 400;
            opacity: 0.9;
        }

        .stat-value {
            color: #ffffff;
            font-size: 5.5vw; 
            font-weight: 550; 
            letter-spacing: -0.5px;
            white-space: nowrap;
        }

        @media (min-width: 480px) {
            .stat-label { font-size: 15px; }
            .stat-value { font-size: 22px; }
        }

        /* Logo Strava Atas */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95px;
            margin-bottom: 25px; 
        }

        .logo-container img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1); 
        }

        /* Logo Sepatu Bawah */
        .sepatu-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 35px; 
            margin-top: 20px; 
        }

        .sepatu-container img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1); 
        }

        /* --- INPUT PANEL --- */
        .calculator-panel {
            background-color: #2a2a2a;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #bbb;
        }

        .input-group {
            display: flex;
            flex-direction: column; 
            gap: 14px; 
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-size: 12px;
            margin-bottom: 6px;
            color: #ccc;
            font-weight: 500;
        }

        .input-field input {
            padding: 12px; 
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            outline: none;
            -webkit-appearance: none;
        }

        .input-field input:focus {
            border-color: var(--strava-orange);
        }

        /* --- ACTION BUTTONS --- */
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--strava-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background-color: #e04900;
        }

        .btn:active {
            transform: scale(0.98); 
        }

        .btn-secondary {
            background-color: #3a3a3a;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background-color: #4a4a4a;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            width: 80%;
            max-width: 280px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 12px;
            position: fixed;
            z-index: 10;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            border-left: 4px solid var(--strava-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.4s, fadeout 0.4s 2.6s;
        }

        @keyframes fadein { from {bottom: 10px; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 10px; opacity: 0;} }
    </style>
</head>
<body>

    <div class="container">
        <h2>Strava Live Generator</h2>

        <div class="preview-wrapper">
            <div id="strava-card">
                <div class="logo-container">
                    <img src="strava-logo.png" alt="Strava">
                </div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Distance</span>
                        <span class="stat-value" id="view-distance">4.04 km</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Pace</span>
                        <span class="stat-value" id="view-pace">8:19 /km</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Time</span>
                        <span class="stat-value" id="view-time">33m 36s</span>
                    </div>
                </div>

                <div class="sepatu-container">
                    <img src="sepatu.png" alt="Sepatu">
                </div>
            </div>
        </div>

        <div class="calculator-panel">
            <div class="panel-title">Masukkan Data Lari</div>
            <div class="input-group">
                <div class="input-field">
                    <label>Jarak (km)</label>
                    <input type="number" id="calc-distance" step="0.01" value="4.04" inputmode="decimal" oninput="recalculateFromDistanceOrPace()">
                </div>
                <div class="input-field">
                    <label>Pace (e.g: 8:19)</label>
                    <input type="text" id="calc-pace-string" value="8:19" placeholder="5:19" oninput="recalculateFromDistanceOrPace()">
                </div>
                <div class="input-field">
                    <label>Waktu (e.g: 33m 36s atau 01:20:15)</label>
                    <input type="text" id="calc-time-display" value="33m 36s" placeholder="33m 36s" oninput="recalculateFromTime()">
                </div>
            </div>
        </div>

        <div class="action-group">
            <button class="btn" onclick="copyTransparent()">Salin Gambar Transparan</button>
            <button class="btn btn-secondary" onclick="downloadTransparent()">Unduh File PNG Transparan</button>
        </div>
    </div>

    <div id="toast" style="border-left-color: var(--strava-orange);">Gambar transparan berhasil disalin!</div>

    <script>
        function recalculateFromDistanceOrPace() {
            const distInput = parseFloat(document.getElementById('calc-distance').value);
            const paceRaw = document.getElementById('calc-pace-string').value.trim();

            document.getElementById('view-distance').innerText = isNaN(distInput) ? "-- km" : `${distInput.toFixed(2)} km`;
            document.getElementById('view-pace').innerText = paceRaw ? `${paceRaw} /km` : "-- /km";

            const paceParts = paceRaw.split(':');
            const paceMinInput = parseInt(paceParts[0]) || 0;
            const paceSecInput = parseInt(paceParts[1]) || 0;

            if (!distInput || distInput <= 0 || (paceMinInput === 0 && paceSecInput === 0) || paceParts.length < 2) {
                document.getElementById('view-time').innerText = document.getElementById('calc-time-display').value || "--";
                return;
            }

            const totalPaceSeconds = (paceMinInput * 60) + paceSecInput;
            const totalTimeSeconds = Math.round(distInput * totalPaceSeconds);

            const hours = Math.floor(totalTimeSeconds / 3600);
            const minutes = Math.floor((totalTimeSeconds % 3600) / 60);
            const seconds = totalTimeSeconds % 60;

            let timeString = "";
            if (hours > 0) { timeString += `${hours}h `; }
            timeString += `${minutes}m ${seconds}s`;

            document.getElementById('view-time').innerText = timeString;
            document.getElementById('calc-time-display').value = timeString;
        }

        function recalculateFromTime() {
            const timeRaw = document.getElementById('calc-time-display').value.trim();
            const distInput = parseFloat(document.getElementById('calc-distance').value);

            document.getElementById('view-time').innerText = timeRaw ? timeRaw : "--";
            document.getElementById('view-distance').innerText = isNaN(distInput) ? "-- km" : `${distInput.toFixed(2)} km`;

            if (!distInput || distInput <= 0 || !timeRaw) return;

            calculatePaceFromDistAndTime(distInput, timeRaw);
        }

        function parseTimeToSeconds(timeStr) {
            let totalSeconds = 0;
            timeStr = timeStr.toLowerCase();

            if (timeStr.includes('m') || timeStr.includes('s') || timeStr.includes('h')) {
                const hrsMatch = timeStr.match(/(\d+)\s*h/);
                const minsMatch = timeStr.match(/(\d+)\s*m/);
                const secsMatch = timeStr.match(/(\d+)\s*s/);

                if (hrsMatch) totalSeconds += parseInt(hrsMatch[1]) * 3600;
                if (minsMatch) totalSeconds += parseInt(minsMatch[1]) * 60;
                if (secsMatch) totalSeconds += parseInt(secsMatch[1]);
            } else {
                const parts = timeStr.split(':').map(Number);
                if (parts.length === 3) {
                    totalSeconds += parts[0] * 3600 + parts[1] * 60 + parts[2];
                } else if (parts.length === 2) {
                    totalSeconds += parts[0] * 60 + parts[1];
                }
            }
            return totalSeconds;
        }

        function calculatePaceFromDistAndTime(distance, timeStr) {
            const totalSeconds = parseTimeToSeconds(timeStr);
            if (totalSeconds <= 0 || !distance) return;

            const paceTotalSeconds = Math.floor(totalSeconds / distance);
            const paceMinutes = Math.floor(paceTotalSeconds / 60);
            const paceSeconds = paceTotalSeconds % 60;

            const formattedPace = `${paceMinutes}:${paceSeconds.toString().padStart(2, '0')}`;
            
            document.getElementById('calc-pace-string').value = formattedPace;
            document.getElementById('view-pace').innerText = `${formattedPace} /km`;
        }

        function generateCanvas(callback) {
            const card = document.getElementById('strava-card');
            const originalBg = card.style.backgroundColor;
            card.style.backgroundColor = 'transparent'; 

            html2canvas(card, { 
                backgroundColor: null,
                logging: false,
                useCORS: true,
                allowTaint: true,
                scale: 2 
            }).then(canvas => {
                card.style.backgroundColor = originalBg; 
                callback(canvas);
            }).catch(err => {
                card.style.backgroundColor = originalBg;
                alert("Gagal memproses gambar: " + err);
            });
        }

        function copyTransparent() {
            generateCanvas(function(canvas) {
                try {
                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            alert("Gagal membuat blob gambar. Silakan gunakan tombol Unduh.");
                            return;
                        }
                        navigator.clipboard.write([
                            new ClipboardItem({ 'image/png': blob })
                        ]).then(() => {
                            showToast("Gambar transparan berhasil disalin!");
                        }).catch(err => {
                            console.error(err);
                            alert("Gagal menyalin otomatis. Gunakan tombol 'Unduh File PNG Transparan'.");
                        });
                    }, 'image/png');
                } catch(e) {
                    alert("Akses salin diblokir browser. Gunakan tombol 'Unduh File PNG Transparan'.");
                }
            });
        }

        function downloadTransparent() {
            generateCanvas(function(canvas) {
                try {
                    const imageURI = canvas.toDataURL('image/png');
                    const createLink = document.createElement('a');
                    const distanceVal = document.getElementById('calc-distance').value || 'run';
                    
                    createLink.download = `strava-stats-${distanceVal}km.png`;
                    createLink.href = imageURI;
                    document.body.appendChild(createLink);
                    createLink.click();
                    document.body.removeChild(createLink);
                    showToast("Gambar berhasil diunduh!");
                } catch(e) {
                    alert("Gagal mengunduh berkas.");
                }
            });
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
